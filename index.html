    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "XERXEZ",
    "alternateName": "XERXEZ Solutions",
    "url": "https://www.xerxez.com",

      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
