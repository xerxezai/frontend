<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Default meta (overridden per-page by react-helmet-async) -->
  <title>XERXEZ — AI-Powered ERP &amp; Enterprise Solutions</title>
  <meta name="description" content="XERXEZ builds enterprise-grade AI ERP systems, MLOps pipelines, SecOps solutions, and cloud infrastructure. Trusted by 40+ enterprises across UAE, India &amp; UK." />
  <meta name="keywords" content="AI ERP, MLOps, DevSecOps, cloud solutions, enterprise AI, XERXEZ" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://www.xerxez.com/" />

  <!-- Open Graph (default; per-page values set by SEO component) -->
  <meta property="og:site_name" content="XERXEZ" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.xerxez.com/" />
  <meta property="og:title" content="XERXEZ — AI-Powered ERP &amp; Enterprise Solutions" />
  <meta property="og:description" content="XERXEZ builds enterprise-grade AI ERP systems, MLOps pipelines, SecOps solutions, and cloud infrastructure. Trusted by 40+ enterprises across UAE, India &amp; UK." />
  <meta property="og:image" content="https://www.xerxez.com/assets/img/logo/xerxez_logo.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@xerxez" />
  <meta name="twitter:title" content="XERXEZ — AI-Powered ERP &amp; Enterprise Solutions" />
  <meta name="twitter:description" content="XERXEZ builds enterprise-grade AI ERP systems, MLOps pipelines, SecOps solutions, and cloud infrastructure." />
  <meta name="twitter:image" content="https://www.xerxez.com/assets/img/logo/xerxez_logo.png" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "XERXEZ",
    "alternateName": "Xerxez AI",
    "url": "https://www.xerxez.com",
    "logo": "https://www.xerxez.com/assets/img/logo/xerxez_logo.png",
    "description": "AI-Powered ERP, MLOps, SecOps & Cloud Solutions for Modern Enterprises",
    "foundingLocation": "India & UAE",
    "areaServed": ["India", "UAE", "UK"],
    "serviceType": ["ERP", "MLOps", "DevSecOps", "Cloud Infrastructure", "AI Training"],
    "sameAs": [
      "https://www.linkedin.com/company/xerxez",
      "https://twitter.com/xerxez",
      "https://www.youtube.com/@xerxezsolutions"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer support",
      "availableLanguage": ["English"]
    }
  }
  </script>

  <!-- Structured Data: WebSite (enables Google Sitelinks Search) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "XERXEZ",
    "url": "https://www.xerxez.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://www.xerxez.com/training?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://backend-production-b9f2.up.railway.app" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
